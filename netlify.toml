# Next.js + @netlify/plugin-nextjs
# - Publish directory must NOT equal the site base directory (repo root). If Netlify UI sets
#   Publish directory to "." or leaves it as the repo root, the plugin errors:
#   "Your publish directory cannot be the same as the base directory"
# - Setting publish = ".next" here overrides the UI and matches the Next.js build output.
#   In Netlify: Site settings → Build & deploy → clear Publish directory OR rely on this file.

[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  NODE_OPTIONS = "--max-old-space-size=4096"
  NEXT_TELEMETRY_DISABLED = "1"
