# Next.js on Netlify: do NOT set publish = ".next" — the runtime plugin emits the correct output.
# See: https://docs.netlify.com/integrations/frameworks/next-js/overview/

[build]
  command = "npm run build"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  NODE_OPTIONS = "--max-old-space-size=4096"
  NEXT_TELEMETRY_DISABLED = "1"
